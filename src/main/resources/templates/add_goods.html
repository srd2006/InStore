<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Goods</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }

        .instore-blue {
            background-color: #334b75;
        }

        .card {
            border-radius: 12px;
        }

        .btn-instore {
            background-color: #334b75;
            color: white;
        }

        .btn-instore:hover {
            background-color: #2b3f63;
            color: white;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-sm">
                <div class="card-header instore-blue text-white text-center fw-bold">
                    Add Goods
                </div>

                <div class="card-body">

                    <!-- 👇 ВАЖНО enctype -->
                    <form th:action="@{/add_goods}" method="post" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label>Type</label>
                            <input type="text" class="form-control" name="type" required>
                        </div>

                        <div class="mb-3">
                            <label>Title</label>
                            <input type="text" class="form-control" name="title" required>
                        </div>

                        <div class="mb-3">
                            <label>Description</label>
                            <textarea class="form-control" name="description"></textarea>
                        </div>

                        <div class="mb-3">
                            <label>Price</label>
                            <input type="number" step="0.01" class="form-control" name="price" required>
                        </div>

                        <!-- 👇 ФОТО -->
                        <div class="mb-4">
                            <label>Фото товара</label>
                            <input type="file" class="form-control" name="file" accept="image/*">
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-instore">ADD GOODS</button>
                        </div>

                    </form>

                    <br>

                    <form action="/">
                        <div class="d-grid">
                            <button class="btn btn-secondary">Назад</button>
                        </div>
                    </form>

                </div>

            </div>
        </div>
    </div>

</div>
</body>
</html>
